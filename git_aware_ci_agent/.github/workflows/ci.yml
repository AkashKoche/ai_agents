name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest | tee ci.log

      - name: Run CI Diagnosis Agent
        if: failure()
        run: |
          docker build -t ci-agent ./agent
          docker run -v $PWD:/repo -w /repo ci-agent
